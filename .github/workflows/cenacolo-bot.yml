name: Cenacolo Bot

on:
  schedule:
    # Ogni 6 ore (UTC): controllo news nuove
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure state file exists
        run: |
          mkdir -p .github/state
          if [ ! -f .github/state/cenacolo_seen.json ]; then
            echo "[]" > .github/state/cenacolo_seen.json
          fi

      - name: Run bot
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          node cenacolo-ticket-bot.js \
            --mode check \
            --notify email \
            --state-file .github/state/cenacolo_seen.json

      - name: Commit updated state
        run: |
          if git diff --quiet -- .github/state/cenacolo_seen.json; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/cenacolo_seen.json
          git commit -m "chore: update cenacolo bot state"
          git push
