name: Cenacolo Digest

on:
  schedule:
    # Una volta al giorno (UTC): invio ultime 5 news
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO2: ${{ secrets.EMAIL_TO2 }}
          DAILY_TOP5_ENABLED: ${{ vars.DAILY_TOP5_ENABLED }}
        run: |
          node cenacolo-ticket-bot.js \
            --mode digest \
            --digest-limit 5 \
            --notify email
