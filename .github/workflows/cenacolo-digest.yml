name: Cenacolo Digest

on:
  schedule:
    # Trigger UTC + guardia timezone Europe/Rome nel job:
    # CET -> 07 UTC | CEST -> 06 UTC
    - cron: "0 6,7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check Rome schedule
        id: schedule
        run: |
          HOUR_ROME="$(TZ=Europe/Rome date +%H)"
          SHOULD_RUN="false"
          if [ "$HOUR_ROME" = "08" ]; then
            SHOULD_RUN="true"
          fi
          echo "rome_hour=$HOUR_ROME" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: github.event_name == 'workflow_dispatch' || steps.schedule.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.schedule.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.schedule.outputs.should_run == 'true'
        run: npm ci

      - name: Run digest
        if: github.event_name == 'workflow_dispatch' || steps.schedule.outputs.should_run == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO2: ${{ secrets.EMAIL_TO2 }}
          DAILY_TOP5_ENABLED: ${{ vars.DAILY_TOP5_ENABLED }}
        run: |
          node cenacolo-ticket-bot.js \
            --mode digest \
            --digest-limit 5 \
            --notify email

      - name: Skip (outside Rome schedule)
        if: github.event_name != 'workflow_dispatch' && steps.schedule.outputs.should_run != 'true'
        run: |
          echo "Skip run: current Europe/Rome hour is ${{ steps.schedule.outputs.rome_hour }}."
